name: masters-dev

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: masters-bck
    user: "1000:1000"
    ports:
      - "${PORT:-8080}:8080"
      - "5005:5005"
      - "35729:35729"
    volumes:
      - .:/app
      - ${GRADLE_CACHE_DIR:-~/.gradle}:/home/gradle/.gradle
      - build-cache:/app/build
    depends_on:
      postgres:
        condition: service_healthy
      gcs:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: masters-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 3s
      retries: 5

  gcs:
    image: fsouza/fake-gcs-server:1.54.0
    container_name: masters-gcs
    command: [ "-scheme", "http", "-port", "4443", "-public-host", "gcs:4443", "-external-url", "http://gcs:4443" ]
    ports:
      - "4443:4443"
    volumes:
      - ./gcs_data:/data

volumes:
  build-cache:
